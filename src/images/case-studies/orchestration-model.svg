<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" font-family="Inter, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1120" height="520" fill="#ffffff"/>

  <!-- ============ LEFT: BEFORE ============ -->
  <text x="60" y="52" font-size="15" font-weight="700" letter-spacing="1.5" fill="#6b7280">BEFORE</text>
  <text x="60" y="82" font-size="22" font-weight="700" fill="#111827">Automations trapped inside the board</text>

  <!-- board container -->
  <rect x="60" y="110" width="420" height="330" rx="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="84" y="146" font-size="14" font-weight="700" fill="#374151">Pipeline board</text>

  <!-- columns -->
  <g>
    <rect x="84" y="164" width="118" height="248" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="212" y="164" width="118" height="248" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="340" y="164" width="118" height="248" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="98" y="186" font-size="11" font-weight="600" fill="#9ca3af">New</text>
    <text x="226" y="186" font-size="11" font-weight="600" fill="#9ca3af">Contacted</text>
    <text x="354" y="186" font-size="11" font-weight="600" fill="#9ca3af">Won</text>
    <!-- cards -->
    <rect x="94" y="198" width="98" height="30" rx="6" fill="#eef2ff"/>
    <rect x="94" y="236" width="98" height="30" rx="6" fill="#eef2ff"/>
    <rect x="222" y="198" width="98" height="30" rx="6" fill="#eef2ff"/>
    <rect x="350" y="198" width="98" height="30" rx="6" fill="#eef2ff"/>
  </g>

  <!-- lock + status coupling callouts -->
  <g>
    <rect x="98" y="300" width="342" height="94" rx="10" fill="#fef2f2" stroke="#fecaca"/>
    <text x="116" y="326" font-size="12.5" font-weight="700" fill="#b91c1c">Logic bolted to board mechanics</text>
    <text x="116" y="348" font-size="12" fill="#7f1d1d">&#8226; Triggers fire on column / status changes only</text>
    <text x="116" y="368" font-size="12" fill="#7f1d1d">&#8226; Fixed defaults move cards without consent</text>
    <text x="116" y="388" font-size="12" fill="#7f1d1d">&#8226; No exclusions, no events, locked structure</text>
  </g>

  <text x="60" y="474" font-size="13" fill="#6b7280">Result: power users disable defaults and rebuild</text>
  <text x="60" y="494" font-size="13" fill="#6b7280">logic in external tools.</text>

  <!-- ============ ARROW ============ -->
  <g>
    <line x1="516" y1="270" x2="600" y2="270" stroke="#111827" stroke-width="2"/>
    <polygon points="600,270 588,263 588,277" fill="#111827"/>
    <text x="512" y="252" font-size="12" font-weight="700" fill="#111827">reframe</text>
  </g>

  <!-- ============ RIGHT: AFTER ============ -->
  <text x="636" y="52" font-size="15" font-weight="700" letter-spacing="1.5" fill="#4338ca">AFTER</text>
  <text x="636" y="82" font-size="22" font-weight="700" fill="#111827">A system-wide orchestration layer</text>

  <!-- automations layer -->
  <rect x="636" y="110" width="424" height="96" rx="14" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="660" y="140" font-size="14" font-weight="700" fill="#3730a3">Automations &#8212; orchestration layer</text>
  <text x="660" y="164" font-size="12" fill="#4338ca">Event-based triggers &#183; conditions &amp; exclusions &#183; priority</text>
  <text x="660" y="184" font-size="12" fill="#4338ca">Human-readable rules &#183; reusable across the system</text>

  <!-- connectors -->
  <g stroke="#a5b4fc" stroke-width="1.5">
    <line x1="700" y1="206" x2="700" y2="250"/>
    <line x1="792" y1="206" x2="792" y2="250"/>
    <line x1="884" y1="206" x2="884" y2="250"/>
    <line x1="976" y1="206" x2="976" y2="250"/>
  </g>

  <!-- surfaces the layer acts on -->
  <g>
    <rect x="646" y="252" width="104" height="150" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="742" y="252" width="104" height="150" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="838" y="252" width="104" height="150" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="934" y="252" width="104" height="150" rx="10" fill="#ffffff" stroke="#e5e7eb"/>

    <text x="662" y="278" font-size="12" font-weight="700" fill="#374151">Pipeline</text>
    <text x="662" y="296" font-size="10.5" fill="#9ca3af">operational</text>
    <text x="662" y="310" font-size="10.5" fill="#9ca3af">view</text>

    <text x="758" y="278" font-size="12" font-weight="700" fill="#374151">Leads &amp;</text>
    <text x="758" y="296" font-size="12" font-weight="700" fill="#374151">Jobs</text>

    <text x="854" y="278" font-size="12" font-weight="700" fill="#374151">Messaging</text>

    <text x="950" y="278" font-size="12" font-weight="700" fill="#374151">AI &amp;</text>
    <text x="950" y="296" font-size="12" font-weight="700" fill="#374151">callbacks</text>

    <!-- mini pipeline columns inside first surface -->
    <rect x="658" y="322" width="24" height="66" rx="4" fill="#f3f4f6"/>
    <rect x="686" y="322" width="24" height="66" rx="4" fill="#f3f4f6"/>
    <rect x="714" y="322" width="24" height="66" rx="4" fill="#f3f4f6"/>
  </g>

  <text x="636" y="474" font-size="13" fill="#6b7280">Pipeline stays a flexible view; automations become</text>
  <text x="636" y="494" font-size="13" fill="#6b7280">first-class infrastructure the whole product can use.</text>
</svg>
